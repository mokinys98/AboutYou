name: Sync product metadata (staging)

on:
  workflow_dispatch:
    inputs:
      max_products:
        description: Maximum products to process (use 50 for canary)
        required: false
        default: "50"
        type: string

concurrency:
  # Share the staging lock with catalog sync so the source is never crawled twice.
  group: catalog-sync-staging
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    environment: staging
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SYNC_HEADLESS: "true"
      METADATA_SYNC_MAX_PRODUCTS: ${{ inputs.max_products || '50' }}
      METADATA_SYNC_CLAIM_SIZE: "25"
      METADATA_SYNC_CONCURRENCY: "3"
      METADATA_SYNC_DELAY_MS: "400"
      METADATA_SYNC_MAX_RUNTIME_MINUTES: "60"
      METADATA_DEBUG_HTML_LIMIT: "20"
      METADATA_DEBUG_RETENTION_DAYS: "14"
      METADATA_RAW_SAMPLE_LIMIT: "750"
      METADATA_RAW_RETENTION_DAYS: "30"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run sync:metadata
