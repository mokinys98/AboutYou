name: Sync product metadata

on:
  schedule:
    - cron: "47 * * * *"
  workflow_dispatch:

concurrency:
  # Serialize both workflows so ABOUT YOU is never crawled by two jobs at once.
  group: catalog-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: read
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SYNC_HEADLESS: "true"
      METADATA_SYNC_MAX_PRODUCTS: "500"
      METADATA_SYNC_CONCURRENCY: "3"
      METADATA_SYNC_DELAY_MS: "750"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run sync:metadata
